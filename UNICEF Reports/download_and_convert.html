];

function safeFilename(title) {
  return title.replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '_') + '.md';
}

function log(msg, cls='info') {
  const p = document.createElement('p');
  p.className = cls;
  p.textContent = msg;
  document.getElementById('log').appendChild(p);
  document.getElementById('log').scrollTop = 99999;
}

async function pdfToText(arrayBuffer) {
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    text += pageText + '\n\n';
  }
  return text;
}

function toMarkdown(title, text, sourceUrl) {
  let md = `# ${title}\n\n`;
  md += `**Source:** [${sourceUrl}](${sourceUrl})\n\n`;
  md += `---\n\n`;
  md += text.replace(/\n{3,}/g, '\n\n').trim();
  return md;
}

async function run() {
  document.getElementById('startBtn').disabled = true;
  const zip = new JSZip();
  let done = 0, failed = 0;

  for (const report of REPORTS) {
    document.getElementById('counter').textContent = `Processing ${done + failed + 1} / ${REPORTS.length}: ${report.title.substring(0, 60)}...`;
    try {
      const resp = await fetch(report.url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const buf = await resp.arrayBuffer();
      const text = await pdfToText(buf);
      const md = toMarkdown(report.title, text, report.url);
      zip.file(safeFilename(report.title), md);
      log(`✓ ${report.title}`, 'ok');
      done++;
    } catch(e) {
      log(`✗ ${report.title}: ${e.message}`, 'err');
      failed++;
    }
    document.getElementById('bar').style.width = ((done + failed) / REPORTS.length * 100) + '%';
  }

  document.getElementById('counter').textContent = `Complete: ${done} succeeded, ${failed} failed. Generating ZIP...`;
  log('Generating ZIP file...', 'info');

  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'UNICEF_Audit_Reports_2024-2026.zip';
  a.click();

  log(`ZIP downloaded! Extract to: Projekty/Audit Report App/Unicef Reports/`, 'ok');
  document.getElementById('counter').textContent = `✅ Done! ${done} reports converted. ZIP saved to your Downloads folder.`;
  document.getElementById('startBtn').disabled = false;
}
</script>
